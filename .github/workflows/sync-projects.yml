name: Sync GitHub Projects

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:       # lets you run it manually

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run script
        run: node scripts/updateProjects.js

      - name: Commit changes
        run: |
          git config user.name "madspark-bot"
          git config user.email "bot@nytmaer.dev"
          git add data/projects.json
          git commit -m "Auto-update projects" || echo "No changes"
          git push
